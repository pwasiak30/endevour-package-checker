name: Update package data

on:
  schedule:
    # codziennie o 4:17 UTC (poza szczytem, zeby nie obciazac API o pelnych godzinach)
    - cron: '17 4 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: 'Odswiez/dodaj tylko ten jeden pakiet (puste = pelne odswiezenie wg data/packages.txt)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: update-package-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dodaj nowy pakiet do listy (jesli podano input i jeszcze go nie ma)
        if: ${{ github.event.inputs.package != '' }}
        run: |
          PKG="${{ github.event.inputs.package }}"
          if ! grep -qxF "$PKG" data/packages.txt; then
            echo "$PKG" >> data/packages.txt
            echo "Dodano '$PKG' do data/packages.txt"
          fi

      - name: Zbuduj dane
        env:
          PACKAGE: ${{ github.event.inputs.package }}
        run: node scripts/build-data.js

      - name: Commit i push wynikow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data data/packages.txt
          if git diff --cached --quiet; then
            echo "Brak zmian w danych - nic do commitowania."
          else
            git commit -m "Aktualizacja danych pakietow ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
