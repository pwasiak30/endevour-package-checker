name: Update package data

on:
  schedule:
    # codziennie o 4:17 UTC (poza szczytem, zeby nie obciazac API o pelnych godzinach)
    - cron: '17 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-package-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Pelny przebieg (wszystkie ~131 tys. pakietow core/extra/multilib + AUR,
    # ograniczone glownie limitem Repology 1 zapytanie/s) trwa rzedu
    # kilkunastu-kilkudziesieciu minut - dajemy spory zapas.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Zbuduj dane (pelny, hurtowy crawl wszystkich pakietow)
        run: node scripts/build-full-data.js

      - name: Commit i push wynikow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "Brak zmian w danych - nic do commitowania."
          else
            git commit -m "Aktualizacja danych pakietow ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
